name: Mirror repository updates to gitlab

on:
  push:
    branches:
      - main

jobs:
  mirror_to_gitlab:
    name: Gitlab Sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Push main branch and all tags to GitLab
        env:
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          host="${GITLAB_URL#https://}"
          host="${host#http://}"
          git remote add target "https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@${host}"
          git push -f target main
          git push -f --tags target
